<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact page with a semantic HTML5 form for reaching Melissa.">
    <title>Contact | Melissa Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Consistent page header and navigation improve usability across the full five-page site. -->
    <header class="site-header">
        <h1>Contact Melissa</h1>
        <p class="tagline">Send a message using the portfolio contact form below.</p>
        <nav aria-label="Primary navigation">
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="data.html">Data</a></li>
                <li><a class="active" href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell">
        <!-- This section groups the contact form in a meaningful content area under the main page heading. -->
        <section>
            <h2>Get in Touch</h2>
            <p>Please complete the form with accurate details so I can respond appropriately.</p>

            <!-- Labels, HTML5 input types, and required fields improve accessibility and basic validation. -->
            <form action="#" method="post">
                <p>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" autocomplete="name" placeholder="Enter your full name" required>
                </p>

                <p>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="name@example.com" required>
                </p>

                <p>
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="+256 700 000000" pattern="[\d\s\+\-]{7,20}" required>
                </p>

                <p>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message here" required></textarea>
                </p>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Footer repeats ownership information and gives the layout a consistent ending. -->
    <footer class="site-footer">
        <p>&copy; 2026 Melissa. All rights reserved.</p>
    </footer>
</body>
</html>
